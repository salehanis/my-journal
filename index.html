<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Space</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    main { max-width: 760px; margin: 0 auto; padding: 44px 24px 80px; }

    .date-line { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }

    .greeting {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--text-bright);
      margin-bottom: 40px;
      font-weight: 400;
    }

    /* Stats */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 36px; }

    .stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      text-align: center;
      transition: border-color 0.2s;
    }

    .stat-box:hover { border-color: var(--muted); }

    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      color: var(--text-bright);
      display: block;
      line-height: 1.1;
    }

    .stat-label { font-size: 0.68rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 6px; }

    /* Habits */
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
    .card-progress { font-size: 0.78rem; color: var(--accent); font-weight: 600; }

    .habit-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      transition: opacity 0.15s;
    }

    .habit-row:last-child { border-bottom: none; }
    .habit-row:active { opacity: 0.7; }

    .habit-check {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--muted);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }

    .habit-row.done .habit-check { background: var(--accent); border-color: var(--accent); }
    .habit-check svg { display: none; }
    .habit-row.done .habit-check svg { display: block; }

    .habit-emoji { font-size: 1rem; flex-shrink: 0; }

    .habit-name { flex: 1; font-size: 0.93rem; color: var(--text); transition: color 0.2s; }
    .habit-row.done .habit-name { color: var(--text-dim); text-decoration: line-through; }

    .habit-streak { font-size: 0.72rem; color: var(--text-dim); }
    .habit-row.done .habit-streak { color: var(--accent); }

    .no-habits { text-align: center; color: var(--text-dim); font-size: 0.88rem; padding: 16px 0; }
    .no-habits a { color: var(--accent); text-decoration: none; }

    /* Tasks */
    .task-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
    }

    .task-row:last-child { border-bottom: none; }

    .task-check {
      width: 20px; height: 20px;
      border-radius: 5px;
      border: 1.5px solid var(--muted);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .task-check:hover { border-color: var(--accent); }
    .task-row.done .task-check { background: var(--accent); border-color: var(--accent); }
    .task-check svg { display: none; }
    .task-row.done .task-check svg { display: block; }

    .task-priority {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      background: transparent;
      cursor: pointer;
      transition: all 0.15s;
    }

    .task-priority.p1 { background: #c09050; }
    .task-priority.p2 { background: #c08080; }
    .task-priority.p3 { background: #8080c0; }

    .task-name {
      flex: 1;
      font-size: 0.93rem;
      color: var(--text);
      cursor: pointer;
      transition: color 0.2s;
    }

    .task-row.done .task-name { color: var(--text-dim); text-decoration: line-through; }

    .task-del {
      background: none; border: none;
      color: var(--muted);
      cursor: pointer; font-size: 0.78rem;
      padding: 2px 6px;
      opacity: 0; transition: opacity 0.15s, color 0.15s;
      border-radius: 4px;
    }

    .task-row:hover .task-del { opacity: 1; }
    .task-del:hover { color: var(--danger); background: var(--danger-dark); }

    .task-inline-edit {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--accent);
      outline: none;
      color: var(--text-bright);
      font-family: 'Inter', sans-serif;
      font-size: 0.93rem;
      padding: 2px 0;
    }

    .task-input-row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      align-items: center;
    }

    .task-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
    }

    .task-input::placeholder { color: var(--muted); }

    .task-add-btn {
      background: none; border: none;
      color: var(--accent);
      cursor: pointer; font-size: 0.82rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500; padding: 4px 8px;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    .task-add-btn:hover { opacity: 0.7; }

    .no-tasks { color: var(--text-dim); font-size: 0.88rem; font-style: italic; padding: 8px 0; }

    /* Priority picker */
    .priority-picker {
      display: none;
      position: absolute;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px;
      gap: 6px;
      z-index: 50;
      flex-direction: column;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .priority-picker.open { display: flex; }

    .priority-opt {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 10px; border-radius: 6px;
      cursor: pointer; font-size: 0.8rem; color: var(--text);
      transition: background 0.1s;
    }

    .priority-opt:hover { background: var(--surface); }
    .priority-opt .dot { width: 8px; height: 8px; border-radius: 50%; }

    /* Journal preview */
    .journal-preview-text { font-size: 0.9rem; color: var(--text); line-height: 1.9; margin-bottom: 16px; white-space: pre-wrap; }
    .journal-preview-text.empty { color: var(--text-dim); font-style: italic; }

    .mood-badge { font-size: 1.1rem; margin-right: 6px; }

    /* Quick links */
    .quick-links { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 28px; }

    .quick-link {
      display: flex; align-items: center; gap: 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 18px;
      text-decoration: none; color: var(--text);
      font-size: 0.88rem; font-weight: 500;
      transition: all 0.15s;
    }

    .quick-link:hover { border-color: var(--muted); color: var(--text-bright); background: var(--surface2); }
    .quick-link svg { color: var(--text-dim); flex-shrink: 0; }
  </style>
</head>

<main>
  <div class="date-line fade-up" id="dateDisplay"></div>
  <h1 class="greeting fade-up-2" id="greeting"></h1>

  <div class="stats-row fade-up-3">
    <div class="stat-box">
      <span class="stat-num" id="statEntries">0</span>
      <div class="stat-label">journal entries</div>
    </div>
    <div class="stat-box">
      <span class="stat-num" id="statHabitsToday">—</span>
      <div class="stat-label">habits today</div>
    </div>
    <div class="stat-box">
      <span class="stat-num" id="statStreak">0</span>
      <div class="stat-label">day streak</div>
    </div>
  </div>

  <div class="section-label">today's habits</div>
  <div class="card">
    <div class="card-header">
      <span class="section-label" style="margin:0">check-in</span>
      <span class="card-progress" id="habitsProgress"></span>
    </div>
    <div id="habitsList"></div>
  </div>

  <div class="section-label">today's tasks</div>
  <div class="card" style="position:relative">
    <div class="card-header">
      <span class="section-label" style="margin:0">to-do</span>
      <span class="card-progress" id="tasksProgress"></span>
    </div>
    <div id="tasksList"></div>
    <div class="task-input-row">
      <input class="task-input" id="taskInput" placeholder="add a task… (press / to focus)" maxlength="120" autocomplete="off">
      <button class="task-add-btn" id="taskAddBtn">+ add</button>
    </div>
    <div id="priorityPicker" class="priority-picker">
      <div class="priority-opt" data-p="0"><span class="dot" style="background:var(--muted)"></span>None</div>
      <div class="priority-opt" data-p="1"><span class="dot" style="background:#c09050"></span>Low</div>
      <div class="priority-opt" data-p="2"><span class="dot" style="background:#c08080"></span>Medium</div>
      <div class="priority-opt" data-p="3"><span class="dot" style="background:#8080c0"></span>High</div>
    </div>
  </div>

  <div class="section-label">today's journal</div>
  <div class="card">
    <div id="journalMood" style="margin-bottom:10px"></div>
    <div class="journal-preview-text" id="journalPreview"></div>
    <a href="journal.html" class="btn btn-accent" id="journalBtn">write today's entry →</a>
  </div>

</main>

<script src="shared.js"></script>
<script>
const TODAY = new Date().toISOString().split('T')[0];
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function getHabits() { return JSON.parse(localStorage.getItem('habits') || '[]'); }
function getChecks() { return JSON.parse(localStorage.getItem('checks') || '{}'); }
function saveChecks(c) { localStorage.setItem('checks', JSON.stringify(c)); }
function getEntries() { return JSON.parse(localStorage.getItem('journalEntries') || '{}'); }
function getTasks() { return JSON.parse(localStorage.getItem('tasks_' + TODAY) || '[]'); }
function saveTasks(t) { localStorage.setItem('tasks_' + TODAY, JSON.stringify(t)); }

// Date & greeting
const now = new Date();
const hour = now.getHours();
const greetWord = hour < 5 ? 'Up late' : hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
const settings = getSettings();
const name = settings.name ? ', ' + settings.name : '';

document.getElementById('dateDisplay').textContent =
  `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()} ${now.getFullYear()}`;
document.getElementById('greeting').textContent = greetWord + name + '.';

// Stats
function updateStats() {
  const entries = getEntries();
  const habits = getHabits();
  const checks = getChecks();
  const todayChecks = checks[TODAY] || {};
  const doneCnt = habits.filter(h => todayChecks[h.id]).length;

  document.getElementById('statEntries').textContent = Object.keys(entries).length;
  document.getElementById('statHabitsToday').textContent =
    habits.length ? `${doneCnt}/${habits.length}` : '—';

  let streak = 0;
  const d = new Date();
  while (true) {
    const key = d.toISOString().split('T')[0];
    if (entries[key]) { streak++; d.setDate(d.getDate() - 1); } else break;
  }
  document.getElementById('statStreak').textContent = streak;
}

// Habits
function getStreak(habitId) {
  const checks = getChecks();
  let streak = 0;
  const d = new Date();
  d.setDate(d.getDate() - 1);
  while (true) {
    const key = d.toISOString().split('T')[0];
    if (checks[key]?.[habitId]) { streak++; d.setDate(d.getDate() - 1); } else break;
  }
  return streak;
}

function renderHabits() {
  const habits = getHabits();
  const checks = getChecks();
  const todayChecks = checks[TODAY] || {};
  const list = document.getElementById('habitsList');
  const progress = document.getElementById('habitsProgress');

  if (!habits.length) {
    list.innerHTML = `<div class="no-habits">No habits yet — <a href="habits.html">set them up</a></div>`;
    progress.textContent = '';
    return;
  }

  const done = habits.filter(h => todayChecks[h.id]).length;
  progress.textContent = `${done} / ${habits.length}`;

  list.innerHTML = habits.map(h => {
    const checked = !!todayChecks[h.id];
    const streak = getStreak(h.id);
    return `<div class="habit-row ${checked ? 'done' : ''}" data-id="${h.id}">
      <div class="habit-check">
        <svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4L4 7.5L10 1" stroke="#0c0c0c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      ${h.emoji ? `<span class="habit-emoji">${h.emoji}</span>` : ''}
      <span class="habit-name">${h.name}</span>
      <span class="habit-streak">${streak > 0 ? streak + 'd 🔥' : ''}</span>
    </div>`;
  }).join('');

  list.querySelectorAll('.habit-row').forEach(row => {
    row.addEventListener('click', () => {
      const id = row.dataset.id;
      const c = getChecks();
      if (!c[TODAY]) c[TODAY] = {};
      c[TODAY][id] = !c[TODAY][id];
      saveChecks(c);
      const allDone = getHabits().every(h => c[TODAY][h.id]);
      if (allDone && getHabits().length > 0) toast('All habits done today! 🎉', 'success', 3000);
      renderHabits();
      updateStats();
    });
  });
}

// Tasks
let pickerTargetIdx = null;

function renderTasks() {
  const tasks = getTasks();
  const list = document.getElementById('tasksList');
  const progress = document.getElementById('tasksProgress');
  const done = tasks.filter(t => t.done).length;
  progress.textContent = tasks.length ? `${done} / ${tasks.length}` : '';

  if (!tasks.length) {
    list.innerHTML = '<div class="no-tasks">Nothing yet — add a task below.</div>';
    return;
  }

  const PRIORITY_CLASSES = ['', 'p1', 'p2', 'p3'];

  list.innerHTML = tasks.map((t, i) => `
    <div class="task-row ${t.done ? 'done' : ''}" data-i="${i}">
      <div class="task-check" data-i="${i}">
        <svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4L4 7.5L10 1" stroke="#0c0c0c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="task-priority ${PRIORITY_CLASSES[t.priority || 0]}" data-i="${i}" title="set priority"></div>
      <span class="task-name" data-i="${i}">${t.text}</span>
      <button class="task-del" data-i="${i}">✕</button>
    </div>
  `).join('');

  // Check
  list.querySelectorAll('.task-check').forEach(el => {
    el.addEventListener('click', () => {
      const tasks = getTasks();
      tasks[el.dataset.i].done = !tasks[el.dataset.i].done;
      saveTasks(tasks);
      renderTasks();
      updateStats();
    });
  });

  // Inline edit
  list.querySelectorAll('.task-name').forEach(el => {
    el.addEventListener('click', () => {
      const i = el.dataset.i;
      const tasks = getTasks();
      const input = document.createElement('input');
      input.value = tasks[i].text;
      input.className = 'task-inline-edit';
      el.replaceWith(input);
      input.focus(); input.select();
      function commit() {
        const val = input.value.trim();
        if (val) tasks[i].text = val;
        saveTasks(tasks);
        toast('Task updated', 'success');
        renderTasks();
      }
      input.addEventListener('blur', commit);
      input.addEventListener('keydown', e => {
        if (e.key === 'Enter') input.blur();
        if (e.key === 'Escape') { saveTasks(tasks); renderTasks(); }
      });
    });
  });

  // Priority
  list.querySelectorAll('.task-priority').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      pickerTargetIdx = parseInt(el.dataset.i);
      const picker = document.getElementById('priorityPicker');
      picker.style.top = (el.getBoundingClientRect().bottom - el.closest('.card').getBoundingClientRect().top + 4) + 'px';
      picker.style.left = (el.getBoundingClientRect().left - el.closest('.card').getBoundingClientRect().left) + 'px';
      picker.classList.toggle('open');
    });
  });

  // Delete
  list.querySelectorAll('.task-del').forEach(el => {
    el.addEventListener('click', () => {
      const tasks = getTasks();
      tasks.splice(el.dataset.i, 1);
      saveTasks(tasks);
      toast('Task removed');
      renderTasks();
    });
  });
}

// Priority picker
document.getElementById('priorityPicker').querySelectorAll('.priority-opt').forEach(opt => {
  opt.addEventListener('click', () => {
    if (pickerTargetIdx === null) return;
    const tasks = getTasks();
    tasks[pickerTargetIdx].priority = parseInt(opt.dataset.p);
    saveTasks(tasks);
    document.getElementById('priorityPicker').classList.remove('open');
    renderTasks();
  });
});

document.addEventListener('click', () => {
  document.getElementById('priorityPicker').classList.remove('open');
});

// Add task
function addTask() {
  const input = document.getElementById('taskInput');
  const text = input.value.trim();
  if (!text) return;
  const tasks = getTasks();
  tasks.push({ text, done: false, priority: 0 });
  saveTasks(tasks);
  input.value = '';
  toast('Task added', 'success');
  renderTasks();
}

document.getElementById('taskAddBtn').addEventListener('click', addTask);
document.getElementById('taskInput').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });

// Keyboard shortcut: / to focus task input
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
    e.preventDefault();
    document.getElementById('taskInput').focus();
  }
});

// Journal preview
function renderJournal() {
  const entries = getEntries();
  const el = document.getElementById('journalPreview');
  const btn = document.getElementById('journalBtn');
  const moodEl = document.getElementById('journalMood');

  if (entries[TODAY]) {
    const entry = entries[TODAY];
    const text = typeof entry === 'object' ? entry.text : entry;
    const mood = typeof entry === 'object' ? entry.mood : null;
    el.textContent = text.length > 220 ? text.slice(0, 220) + '…' : text;
    el.classList.remove('empty');
    moodEl.innerHTML = mood ? `<span class="mood-badge">${mood}</span>` : '';
    btn.textContent = 'edit today\'s entry →';
  } else {
    el.textContent = 'Nothing written yet today.';
    el.classList.add('empty');
    moodEl.innerHTML = '';
    btn.textContent = 'write today\'s entry →';
  }
}

renderHabits();
renderTasks();
renderJournal();
updateStats();
</script>
</body>
