<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journal — My Space</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    .layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      min-height: calc(100vh - 57px);
    }

    /* Sidebar */
    .sidebar {
      border-right: 1px solid var(--border);
      padding: 20px 0;
      overflow-y: auto;
      position: sticky;
      top: 57px;
      height: calc(100vh - 57px);
      display: flex;
      flex-direction: column;
    }

    .sidebar-search {
      margin: 0 12px 16px;
      position: relative;
    }

    .sidebar-search input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px 8px 32px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }

    .sidebar-search input:focus { border-color: var(--muted); }
    .sidebar-search input::placeholder { color: var(--muted); }

    .sidebar-search svg {
      position: absolute;
      left: 9px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .new-entry-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 16px;
      margin: 0 12px 16px;
      border-radius: 8px;
      border: 1px dashed var(--muted);
      background: transparent;
      color: var(--text-dim);
      font-size: 0.82rem;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .new-entry-btn:hover { border-color: var(--accent); color: var(--accent); }

    .sidebar-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      padding: 0 16px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .entry-list { flex: 1; overflow-y: auto; }

    .entry-item {
      padding: 11px 16px;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: all 0.15s;
    }

    .entry-item:hover { background: var(--surface); }
    .entry-item.active { border-left-color: var(--accent); background: var(--surface); }

    .entry-item-top { display: flex; align-items: center; justify-content: space-between; }

    .entry-date { font-size: 0.82rem; color: var(--text); font-weight: 500; }
    .entry-mood-small { font-size: 0.9rem; }
    .entry-preview { font-size: 0.73rem; color: var(--text-dim); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .no-entries { padding: 16px; color: var(--text-dim); font-size: 0.85rem; }

    /* Editor */
    .editor-area { padding: 44px 56px 80px; max-width: 680px; }

    .editor-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }

    .editor-date { font-size: 0.73rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; }

    .editor-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; color: var(--text-bright);
      margin-bottom: 20px; font-weight: 400; font-style: italic;
    }

    /* Mood selector */
    .mood-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .mood-label { font-size: 0.72rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-right: 4px; }

    .mood-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1;
    }

    .mood-btn:hover { border-color: var(--muted); transform: scale(1.1); }
    .mood-btn.selected { border-color: var(--accent); background: var(--accent-dark); }

    /* Toolbar */
    .editor-toolbar {
      display: flex; gap: 6px; align-items: center;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .toolbar-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 10px;
      color: var(--text-dim); cursor: pointer;
      font-size: 0.78rem; font-family: 'Inter', sans-serif;
      transition: all 0.15s;
    }

    .toolbar-btn:hover { color: var(--text); border-color: var(--muted); background: var(--surface); }

    .word-count { font-size: 0.72rem; color: var(--text-dim); margin-left: auto; }

    textarea {
      width: 100%; background: transparent;
      border: none; outline: none;
      color: var(--text); font-family: 'Inter', sans-serif;
      font-size: 0.97rem; line-height: 2;
      resize: none; min-height: 55vh;
    }

    textarea::placeholder { color: var(--muted); }

    .editor-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding-top: 20px; border-top: 1px solid var(--border);
      margin-top: 20px;
    }

    .save-status { font-size: 0.78rem; color: var(--text-dim); }
    .save-status.saved { color: var(--accent); }

    .shortcut-hint { font-size: 0.72rem; color: var(--text-dim); }

    @media (max-width: 640px) {
      .layout { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .editor-area { padding: 28px 20px 80px; }
    }
  </style>
</head>

<div class="layout">
  <aside class="sidebar">
    <button class="new-entry-btn" id="newEntryBtn">+ today's entry</button>

    <div class="sidebar-search">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search entries…">
    </div>

    <div class="sidebar-label">entries</div>
    <div class="entry-list" id="entryList"></div>
  </aside>

  <div class="editor-area">
    <div class="editor-top">
      <div class="editor-date" id="editorDate"></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" id="deleteBtn" style="display:none">delete entry</button>
      </div>
    </div>
    <div class="editor-title" id="editorTitle"></div>

    <div class="mood-row">
      <span class="mood-label">mood</span>
      <button class="mood-btn" data-mood="😊">😊</button>
      <button class="mood-btn" data-mood="😌">😌</button>
      <button class="mood-btn" data-mood="😐">😐</button>
      <button class="mood-btn" data-mood="😔">😔</button>
      <button class="mood-btn" data-mood="😤">😤</button>
      <button class="mood-btn" data-mood="😴">😴</button>
    </div>

    <div class="editor-toolbar">
      <button class="toolbar-btn" data-insert="**bold**" title="Bold">B</button>
      <button class="toolbar-btn" data-insert="*italic*" title="Italic"><em>i</em></button>
      <button class="toolbar-btn" data-insert="- ">• list</button>
      <button class="toolbar-btn" id="dateStampBtn">📅 date</button>
      <span class="word-count" id="wordCount"></span>
    </div>

    <textarea id="journalText" placeholder="Start writing… your words stay here."></textarea>

    <div class="editor-footer">
      <span class="save-status" id="saveStatus"></span>
      <span class="shortcut-hint">⌘ + Enter to save</span>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
const TODAY = new Date().toISOString().split('T')[0];
let currentDate = TODAY;
let saveTimer = null;
let currentMood = null;

const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function getEntries() { return JSON.parse(localStorage.getItem('journalEntries') || '{}'); }
function saveEntries(e) { localStorage.setItem('journalEntries', JSON.stringify(e)); }

function getEntryText(entry) { return typeof entry === 'object' ? (entry.text || '') : (entry || ''); }
function getEntryMood(entry) { return typeof entry === 'object' ? entry.mood : null; }

function formatDate(iso) {
  const d = new Date(iso + 'T12:00:00');
  return `${DAYS[d.getDay()]}, ${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
}

function formatShort(iso) {
  const d = new Date(iso + 'T12:00:00');
  return `${MONTHS[d.getMonth()].slice(0,3)} ${d.getDate()}`;
}

function renderSidebar(filter = '') {
  const entries = getEntries();
  const list = document.getElementById('entryList');
  let keys = Object.keys(entries).sort((a, b) => b.localeCompare(a));

  if (filter) {
    keys = keys.filter(k => getEntryText(entries[k]).toLowerCase().includes(filter.toLowerCase()));
  }

  if (!keys.length) {
    list.innerHTML = `<div class="no-entries">${filter ? 'No matches.' : 'No past entries yet.'}</div>`;
    return;
  }

  list.innerHTML = keys.map(k => {
    const entry = entries[k];
    const text = getEntryText(entry);
    const mood = getEntryMood(entry);
    return `<div class="entry-item ${k === currentDate ? 'active' : ''}" data-date="${k}">
      <div class="entry-item-top">
        <div class="entry-date">${formatShort(k)}${k === TODAY ? ' · today' : ''}</div>
        ${mood ? `<span class="entry-mood-small">${mood}</span>` : ''}
      </div>
      <div class="entry-preview">${text.slice(0, 55) || '…'}</div>
    </div>`;
  }).join('');

  list.querySelectorAll('.entry-item').forEach(el => {
    el.addEventListener('click', () => loadEntry(el.dataset.date));
  });
}

function loadEntry(date) {
  currentDate = date;
  const entries = getEntries();
  const entry = entries[date];
  const text = entry ? getEntryText(entry) : '';
  const mood = entry ? getEntryMood(entry) : null;
  const ta = document.getElementById('journalText');

  document.getElementById('editorDate').textContent = formatDate(date);
  document.getElementById('editorTitle').textContent =
    date === TODAY ? "What's on your mind?" : 'Past entry';
  ta.value = text;
  updateWordCount(text);

  // Mood
  currentMood = mood;
  document.querySelectorAll('.mood-btn').forEach(b => {
    b.classList.toggle('selected', b.dataset.mood === mood);
  });

  document.getElementById('saveStatus').textContent = '';
  document.getElementById('saveStatus').className = 'save-status';
  document.getElementById('deleteBtn').style.display = text ? 'inline-flex' : 'none';

  renderSidebar(document.getElementById('searchInput').value);
  ta.focus();
}

function updateWordCount(text) {
  const words = text.trim() ? text.trim().split(/\s+/).length : 0;
  document.getElementById('wordCount').textContent = words ? `${words} word${words !== 1 ? 's' : ''}` : '';
}

function scheduleAutosave() {
  clearTimeout(saveTimer);
  document.getElementById('saveStatus').textContent = 'saving…';
  document.getElementById('saveStatus').className = 'save-status';
  saveTimer = setTimeout(doSave, 900);
}

function doSave() {
  const ta = document.getElementById('journalText');
  const val = ta.value.trim();
  const entries = getEntries();
  if (val || currentMood) {
    entries[currentDate] = { text: ta.value, mood: currentMood };
    document.getElementById('deleteBtn').style.display = 'inline-flex';
  } else {
    delete entries[currentDate];
    document.getElementById('deleteBtn').style.display = 'none';
  }
  saveEntries(entries);
  renderSidebar(document.getElementById('searchInput').value);
  document.getElementById('saveStatus').textContent = 'saved';
  document.getElementById('saveStatus').className = 'save-status saved';
  setTimeout(() => {
    if (document.getElementById('saveStatus').textContent === 'saved')
      document.getElementById('saveStatus').textContent = '';
  }, 2000);
}

document.getElementById('journalText').addEventListener('input', e => {
  updateWordCount(e.target.value);
  scheduleAutosave();
});

// Cmd/Ctrl+Enter to save immediately
document.getElementById('journalText').addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
    clearTimeout(saveTimer);
    doSave();
    toast('Entry saved', 'success');
  }
});

// Mood
document.querySelectorAll('.mood-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const mood = btn.dataset.mood;
    currentMood = currentMood === mood ? null : mood;
    document.querySelectorAll('.mood-btn').forEach(b => b.classList.toggle('selected', b.dataset.mood === currentMood));
    scheduleAutosave();
  });
});

// Toolbar
document.querySelectorAll('[data-insert]').forEach(btn => {
  btn.addEventListener('click', () => {
    const ta = document.getElementById('journalText');
    const start = ta.selectionStart, end = ta.selectionEnd;
    const insert = btn.dataset.insert;
    ta.value = ta.value.slice(0, start) + insert + ta.value.slice(end);
    ta.selectionStart = ta.selectionEnd = start + insert.length;
    ta.focus();
    scheduleAutosave();
  });
});

document.getElementById('dateStampBtn').addEventListener('click', () => {
  const ta = document.getElementById('journalText');
  const stamp = new Date().toLocaleString();
  const pos = ta.selectionStart;
  ta.value = ta.value.slice(0, pos) + `\n[${stamp}]\n` + ta.value.slice(pos);
  ta.focus();
  scheduleAutosave();
});

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  renderSidebar(e.target.value);
});

document.getElementById('newEntryBtn').addEventListener('click', () => loadEntry(TODAY));

document.getElementById('deleteBtn').addEventListener('click', () => {
  if (!confirm('Delete this entry?')) return;
  const entries = getEntries();
  delete entries[currentDate];
  saveEntries(entries);
  toast('Entry deleted');
  renderSidebar();
  loadEntry(TODAY);
});

loadEntry(TODAY);
</script>
</body>
