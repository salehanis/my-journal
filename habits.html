<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Habits — My Space</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    main { max-width: 720px; margin: 0 auto; padding: 44px 24px 80px; }

    .page-header { margin-bottom: 36px; }
    .page-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-dim); margin-bottom: 8px; }
    h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--text-bright); font-weight: 400; }

    /* Week strip */
    .week-strip { display: flex; gap: 8px; margin-bottom: 36px; }
    .week-day { flex: 1; text-align: center; cursor: pointer; }
    .week-day-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .week-day-num {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; color: var(--text-dim);
      margin: 0 auto; border: 1px solid transparent;
      transition: all 0.15s;
    }
    .week-day.today .week-day-num { border-color: var(--accent); color: var(--accent); }
    .week-day.selected .week-day-num { background: var(--accent); color: #0c0c0c; border-color: var(--accent); }
    .week-day.has-data .week-day-label::after { content: '·'; color: var(--accent); margin-left: 2px; }

    /* Habit list */
    .habit-row {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 0; border-bottom: 1px solid var(--border);
      transition: opacity 0.2s;
    }
    .habit-row:first-of-type { border-top: 1px solid var(--border); }

    .habit-check {
      width: 24px; height: 24px; border-radius: 50%;
      border: 1.5px solid var(--muted);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s;
    }
    .habit-check:hover { border-color: var(--accent); }
    .habit-row.done .habit-check { background: var(--accent); border-color: var(--accent); }
    .habit-check svg { display: none; }
    .habit-row.done .habit-check svg { display: block; }

    .habit-emoji-display { font-size: 1.1rem; flex-shrink: 0; min-width: 24px; text-align: center; }

    .habit-info { flex: 1; min-width: 0; }
    .habit-name { font-size: 0.95rem; color: var(--text); transition: color 0.2s; }
    .habit-row.done .habit-name { color: var(--text-dim); text-decoration: line-through; }
    .habit-meta { font-size: 0.73rem; color: var(--text-dim); margin-top: 2px; }
    .habit-streak-badge { color: var(--accent); }

    .habit-actions { display: flex; gap: 6px; opacity: 0; transition: opacity 0.15s; }
    .habit-row:hover .habit-actions { opacity: 1; }

    .icon-btn {
      background: none; border: none;
      color: var(--text-dim); cursor: pointer;
      padding: 4px 6px; font-size: 0.75rem;
      border-radius: 5px; transition: all 0.15s;
    }

    .icon-btn:hover { color: var(--text); background: var(--surface2); }
    .icon-btn.del:hover { color: var(--danger); background: var(--danger-dark); }

    /* Add habit */
    .add-form { display: flex; gap: 10px; align-items: center; }
    .add-form input { flex: 1; }

    .emoji-picker-row {
      display: flex; gap: 6px; flex-wrap: wrap;
      margin-top: 10px;
    }

    .emoji-opt {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 10px;
      font-size: 1rem; cursor: pointer;
      transition: all 0.15s;
    }

    .emoji-opt:hover, .emoji-opt.selected { border-color: var(--accent); background: var(--accent-dark); }

    /* Heatmap */
    .heatmap { display: flex; gap: 3px; flex-wrap: wrap; }
    .heatmap-cell {
      width: 13px; height: 13px; border-radius: 3px;
      background: var(--surface); border: 1px solid var(--border);
      transition: background 0.2s;
    }
    .heatmap-cell.low { background: #1e2e1e; border-color: #1e2e1e; }
    .heatmap-cell.mid { background: #2d4a2d; border-color: #2d4a2d; }
    .heatmap-cell.high { background: var(--accent); border-color: var(--accent); opacity: 0.85; }

    .heatmap-legend {
      display: flex; align-items: center; gap: 5px;
      margin-top: 10px; font-size: 0.7rem; color: var(--text-dim);
    }

    .legend-cell { width: 11px; height: 11px; border-radius: 2px; }

    .empty-habits { color: var(--text-dim); font-size: 0.9rem; padding: 20px 0; font-style: italic; }

    /* Edit modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 28px; width: 360px; max-width: 90vw;
    }
    .modal h3 { font-size: 1rem; color: var(--text-bright); margin-bottom: 18px; font-weight: 500; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
  </style>
</head>

<main>
  <div class="page-header fade-up">
    <div class="page-label">daily habits</div>
    <h1>Track your days.</h1>
  </div>

  <div class="week-strip fade-up-2" id="weekStrip"></div>

  <div class="section-label" id="checkInLabel" style="margin-bottom:0"></div>
  <div id="habitsList" style="margin-bottom:36px"></div>

  <div class="section-label">add a habit</div>
  <div class="card fade-up-3">
    <div class="add-form">
      <input type="text" id="habitInput" placeholder="e.g. drink water, read 20 min…" maxlength="60">
      <button class="btn btn-accent" id="addBtn">add</button>
    </div>
    <div style="margin-top:14px">
      <div class="section-label" style="margin-bottom:8px">pick an emoji (optional)</div>
      <div class="emoji-picker-row" id="emojiPicker">
        <div class="emoji-opt" data-e="">—</div>
        <div class="emoji-opt" data-e="💧">💧</div>

        <div class="emoji-opt" data-e="🧘">🧘</div>
        <div class="emoji-opt" data-e="😴">😴</div>
        <div class="emoji-opt" data-e="🥗">🥗</div>
        <div class="emoji-opt" data-e="💊">💊</div>
        <div class="emoji-opt" data-e="✍️">✍️</div>
        <div class="emoji-opt" data-e="🎯">🎯</div>

    <div class="heatmap-legend">
      <span>less</span>
      <div class="legend-cell" style="background:var(--surface);border:1px solid var(--border)"></div>
      <div class="legend-cell" style="background:#1e2e1e"></div>

  <div class="modal">
    <h3>Edit habit</h3>
    <input type="text" id="editHabitInput" maxlength="60" style="margin-bottom:14px">
    <div class="section-label" style="margin-bottom:8px">emoji</div>
    <div class="emoji-picker-row" id="editEmojiPicker">
      <div class="emoji-opt" data-e="">—</div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="editCancelBtn">cancel</button>
      <button class="btn btn-accent" id="editSaveBtn">save</button>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
const TODAY = new Date().toISOString().split('T')[0];
let selectedDate = TODAY;
let selectedEmoji = '';
let editingId = null;
let editEmoji = '';

const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function getHabits() { return JSON.parse(localStorage.getItem('habits') || '[]'); }
function saveHabits(h) { localStorage.setItem('habits', JSON.stringify(h)); }
function getChecks() { return JSON.parse(localStorage.getItem('checks') || '{}'); }
function saveChecks(c) { localStorage.setItem('checks', JSON.stringify(c)); }
function dateStr(d) { return d.toISOString().split('T')[0]; }

// Week strip
function renderWeek() {
  const strip = document.getElementById('weekStrip');
  const checks = getChecks();
  const habits = getHabits();
  const days = Array.from({length: 7}, (_, i) => { const d = new Date(); d.setDate(d.getDate() - (6 - i)); return d; });

  strip.innerHTML = days.map(d => {
    const key = dateStr(d);
    const done = habits.filter(h => checks[key]?.[h.id]).length;
    const isToday = key === TODAY;
    const isSelected = key === selectedDate;
    return `<div class="week-day ${isToday ? 'today' : ''} ${isSelected ? 'selected' : ''} ${done > 0 ? 'has-data' : ''}" data-date="${key}">
      <div class="week-day-label">${DAYS_SHORT[d.getDay()]}</div>
      <div class="week-day-num">${d.getDate()}</div>
    </div>`;
  }).join('');

  strip.querySelectorAll('.week-day').forEach(el => {
    el.addEventListener('click', () => { selectedDate = el.dataset.date; renderWeek(); renderHabits(); });
  });
}

// Habits
function getStreak(habitId) {
  const checks = getChecks();
  let streak = 0;
  const d = new Date();
  if (checks[TODAY]?.[habitId]) streak++;
  d.setDate(d.getDate() - 1);
  while (true) {
    const key = dateStr(d);
    if (checks[key]?.[habitId]) { streak++; d.setDate(d.getDate() - 1); } else break;
  }
  return streak;
}

function renderHabits() {
  const habits = getHabits();
  const checks = getChecks();
  const dayChecks = checks[selectedDate] || {};
  const list = document.getElementById('habitsList');
  const isToday = selectedDate === TODAY;

  const d = new Date(selectedDate + 'T12:00:00');
  document.getElementById('checkInLabel').textContent = isToday
    ? "today's check-in"
    : `${DAYS_SHORT[d.getDay()]}, ${MONTHS_SHORT[d.getMonth()]} ${d.getDate()}`;

  if (!habits.length) {
    list.innerHTML = '<div class="empty-habits">Add your first habit below to start tracking.</div>';
    return;
  }

  list.innerHTML = habits.map(h => {
    const done = !!dayChecks[h.id];
    const streak = getStreak(h.id);
    return `<div class="habit-row ${done ? 'done' : ''}" data-id="${h.id}">
      <div class="habit-check" data-id="${h.id}">
        <svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4L4 7.5L10 1" stroke="#0c0c0c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="habit-emoji-display">${h.emoji || ''}</span>
      <div class="habit-info">
        <div class="habit-name">${h.name}</div>
        ${streak > 0 ? `<div class="habit-meta"><span class="habit-streak-badge">🔥 ${streak} day streak</span></div>` : ''}
      </div>
      <div class="habit-actions">
        <button class="icon-btn" data-edit="${h.id}" title="edit">✎</button>
        <button class="icon-btn del" data-del="${h.id}" title="remove">✕</button>
      </div>
    </div>`;
  }).join('');

  list.querySelectorAll('.habit-check').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      const c = getChecks();
      if (!c[selectedDate]) c[selectedDate] = {};
      c[selectedDate][id] = !c[selectedDate][id];
      saveChecks(c);
      const allDone = getHabits().every(h => c[selectedDate][h.id]);
      if (allDone && getHabits().length > 0 && selectedDate === TODAY) toast('All habits done! 🎉', 'success', 3000);
      renderHabits(); renderWeek(); renderHeatmap();
    });
  });

  list.querySelectorAll('[data-edit]').forEach(el => {
    el.addEventListener('click', e => { e.stopPropagation(); openEditModal(el.dataset.edit); });
  });

  list.querySelectorAll('[data-del]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      if (!confirm('Remove this habit?')) return;
      const habits = getHabits().filter(h => h.id !== el.dataset.del);
      saveHabits(habits);
      toast('Habit removed');
      renderHabits(); renderWeek(); renderHeatmap();
    });
  });
}

// Emoji picker (add form)
document.getElementById('emojiPicker').querySelectorAll('.emoji-opt').forEach(opt => {
  opt.addEventListener('click', () => {
    selectedEmoji = opt.dataset.e;
    document.getElementById('emojiPicker').querySelectorAll('.emoji-opt').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
  });
});

// Add habit
document.getElementById('addBtn').addEventListener('click', addHabit);
document.getElementById('habitInput').addEventListener('keydown', e => { if (e.key === 'Enter') addHabit(); });

function addHabit() {
  const input = document.getElementById('habitInput');
  const name = input.value.trim();
  if (!name) return;
  const habits = getHabits();
  habits.push({ id: Date.now().toString(), name, emoji: selectedEmoji });
  saveHabits(habits);
  input.value = '';
  selectedEmoji = '';
  document.getElementById('emojiPicker').querySelectorAll('.emoji-opt').forEach(o => o.classList.remove('selected'));
  toast('Habit added', 'success');
  renderHabits(); renderWeek(); renderHeatmap();
}

// Edit modal
function openEditModal(id) {
  editingId = id;
  const habit = getHabits().find(h => h.id === id);
  if (!habit) return;
  editEmoji = habit.emoji || '';
  document.getElementById('editHabitInput').value = habit.name;
  document.getElementById('editEmojiPicker').querySelectorAll('.emoji-opt').forEach(o => {
    o.classList.toggle('selected', o.dataset.e === editEmoji);
  });
  document.getElementById('editModal').classList.add('open');
  document.getElementById('editHabitInput').focus();
}

document.getElementById('editEmojiPicker').querySelectorAll('.emoji-opt').forEach(opt => {
  opt.addEventListener('click', () => {
    editEmoji = opt.dataset.e;
    document.getElementById('editEmojiPicker').querySelectorAll('.emoji-opt').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
  });
});

document.getElementById('editSaveBtn').addEventListener('click', () => {
  const name = document.getElementById('editHabitInput').value.trim();
  if (!name) return;
  const habits = getHabits();
  const h = habits.find(h => h.id === editingId);
  if (h) { h.name = name; h.emoji = editEmoji; }
  saveHabits(habits);
  document.getElementById('editModal').classList.remove('open');
  toast('Habit updated', 'success');
  renderHabits();
});

document.getElementById('editCancelBtn').addEventListener('click', () => {
  document.getElementById('editModal').classList.remove('open');
});

document.getElementById('editModal').addEventListener('click', e => {
  if (e.target === document.getElementById('editModal'))
    document.getElementById('editModal').classList.remove('open');
});

// Heatmap
function renderHeatmap() {
  const checks = getChecks();
  const habits = getHabits();
  const heatmap = document.getElementById('heatmap');
  const cells = [];
  for (let i = 89; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const key = dateStr(d);
    const done = habits.filter(h => checks[key]?.[h.id]).length;
    const ratio = habits.length ? done / habits.length : 0;
    let cls = '';
    if (ratio > 0 && ratio < 0.34) cls = 'low';
    else if (ratio >= 0.34 && ratio < 0.67) cls = 'mid';
    else if (ratio >= 0.67) cls = 'high';
    cells.push(`<div class="heatmap-cell ${cls}" title="${key}: ${done}/${habits.length}"></div>`);
  }
  heatmap.innerHTML = cells.join('');
}

renderWeek();
renderHabits();
renderHeatmap();
</script>
</body>
